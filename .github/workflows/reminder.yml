name: Daily Reminder

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install deps
        run: npm install

      - name: Run script
        run: node index.js
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}